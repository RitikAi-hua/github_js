<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing: border-box;
    }
    .game-container{
        width:100%;
        max-width: 360px;
        padding:20px;
        margin-left:180px;
    }
    .top-buttons{
        display:flex;
        max-width:360px;
       gap:10px;
       justify-content: space-between;
       margin-bottom:15px;
    }
    .nav-button{
        flex:1;
        padding:10px;
        border:1px solid black;
        border-radius:2px;
        font-size:12px;
        cursor:pointer;
    }
    .game-box {
    background-color: #4a4a4a;
    padding: 25px 20px 35px;
    text-align: center;
    
}

/* Main title styling */
.main-heading {
    font-size: 28px;
    margin-bottom: 15px;
    font-weight: bold;
}

/* Description text styling */
.description {
    color: #e0e0e0;
    font-size: 14px;
    margin-bottom: 10px;
}

/* Large heading for guessing section */
.guess-heading {
    font-size: 48px;
    font-weight: normal;
    margin-top: 40px;
    margin-bottom: 25px;
}

/* Input field for number entry */
.guess-input {
    width: 160px;
    height: 40px;
    border: 3px solid #bdbdbd;
    font-size: 20px;
    text-align: center;
    outline: none;
    margin-bottom: 30px;
}

/* Submit button styling */
.submit-button {
    display: block;
    margin: 0 auto 25px;
    padding: 12px 28px;
    background-color: #1f1f1f;
    color: #ffffff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
}

/* Add hover effect to buttons */
.submit-button:hover,
.nav-button:hover {
    opacity: 0.9;
}

/* Section displaying previous and remaining guesses */
.result-section {
    font-size: 14px;
    line-height: 2;
}

/* Highlight dynamic values */
.previous-guesses,
.remaining-guesses {
    font-weight: bold;
}

</style>

<body>

    <div class="game-container">

        <div class="top-buttons">
            <button class="nav-button">Home</button>
            <button class="nav-button">Youtube Channel</button>
        </div>

        <div class="game-box">

            <h1 class="main-heading">Number guessing game</h1>

            <p class="description">
                Try and guess a random number between 1 and 100.
            </p>

            <p class="description">
                You have 10 attempts to guess the right number.
            </p>

            <h2 class="guess-heading">Guess a number</h2>
       <form class="form">
            <input
                type="number"
                class="guess-input"
                id="guessfield"
                min="1"
                max="100"
            >

            <button class="submit-button" id="submit">
                Submit guess
            </button>
        </form>
            <div class="resultparas">

                <p>
                    Previous Guesses:
                    <span class="guesses"></span>
                </p>

                <p>
                    Guesses Remaining:
                    <span class="lastResult">10</span>
                </p>
                <p class="lowOrHi"></p>
            </div>

        </div>

    </div>

</body>

   })

</script>
</html>
